networks:
  frontend:
    external: true
  app:
    driver: bridge
    internal: false
  proxy:
    name: proxy
services:
  phpfpm:
    image: itkdev/php8.4-fpm:alpine
    user: ${COMPOSE_USER:-deploy}
    networks:
      - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PHP_MAX_EXECUTION_TIME=30
      - PHP_MEMORY_LIMIT=256M
    volumes:
      - .:/app

  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    restart: unless-stopped
    networks:
      - app
      - frontend
    depends_on:
      - phpfpm
    volumes:
      - ./.docker/templates:/etc/nginx/templates:ro
      - ./.docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app
    environment:
      NGINX_FPM_SERVICE: ${COMPOSE_PROJECT_NAME}-phpfpm-1:9000
      NGINX_WEB_ROOT: /app/public
      NGINX_PORT: 8080
      NGINX_MAX_BODY_SIZE: 5M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"

      # Main router (no auth) — matches everything EXCEPT /iframe-test
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.rule=Host(`${COMPOSE_SERVER_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.middlewares=redirect-to-https"

      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_SERVER_DOMAIN}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"

      # HTTPS redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      # Auth router — matches /iframe-test with basic auth
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-auth-http.rule=Host(`${COMPOSE_SERVER_DOMAIN}`) && (PathPrefix(`/iframe-test`) || PathPrefix(`/get-key`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-auth-http.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-auth-http.middlewares=redirect-to-https"

      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-auth.rule=Host(`${COMPOSE_SERVER_DOMAIN}`) && (PathPrefix(`/iframe-test`) || PathPrefix(`/get-key`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-auth.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-auth.middlewares=auth"

      # Basic auth middleware
      - "traefik.http.middlewares.auth.basicauth.users=${BASIC_AUTH}"
